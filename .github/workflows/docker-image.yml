name: Docker Image CI

on:
  push:
    paths:
      - 'dockerFile/**'
      - '.github/workflows/docker-image.yml'
      - 'scripts/smoke_test.sh'
    branches: [main, docker]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  REGISTRY: docker.io
  IMAGE_NAME: alienkh/px4_sim
  PX4_VERSION: "1.17.0"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: no-gpu
            dockerfile: dockerFile/Dockerfile_px4_sim_NO_GPU
            tag_suffix: ""
            cache_from: type=registry,ref=docker.io/alienkh/px4_sim:buildcache
            cache_to: type=registry,ref=docker.io/alienkh/px4_sim:buildcache,mode=max
          - variant: gpu
            dockerfile: dockerFile/Dockerfile_px4_sim_with_GPU
            tag_suffix: "_GPU"
            cache_from: |
              type=registry,ref=docker.io/alienkh/px4_sim:buildcache_GPU
              type=gha,scope=px4-sim-gpu
            cache_to: type=gha,scope=px4-sim-gpu,mode=max
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space (GPU build)
        if: matrix.variant == 'gpu'
        run: |
          sudo docker buildx prune -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            PX4_VERSION=${{ env.PX4_VERSION }}
            XRCE_AGENT_VERSION=v2.4.3
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PX4_VERSION }}_${{ github.run_number }}${{ matrix.tag_suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PX4_VERSION }}-latest${{ matrix.tag_suffix }}
          cache-from: ${{ matrix.cache_from }}
          cache-to: ${{ matrix.cache_to }}
          provenance: false
          sbom: false

  smoke_test:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run headless SITL smoke test
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PX4_VERSION }}_${{ github.run_number }}"
          docker pull "${IMAGE}"
          chmod +x scripts/smoke_test.sh
          SMOKE_TEST_TIMEOUT=600 ./scripts/smoke_test.sh "${IMAGE}"
