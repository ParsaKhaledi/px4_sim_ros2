name: Docker Image CI

on:
  push:
    paths:
      - 'dockerFile/**'
      - '.github/workflows/docker-image.yml'
      - 'scripts/smoke_test.sh'
    branches: [main, docker]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  REGISTRY: docker.io
  IMAGE_NAME: alienkh/px4_sim
  PX4_VERSION: "1.17.0"
  RELEASE_VERSION: "3.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - variant: no-gpu
            dockerfile: dockerFile/Dockerfile_px4_sim_NO_GPU
            tag_suffix: ""
            cache_scope: px4-sim-no-gpu
          - variant: gpu
            dockerfile: dockerFile/Dockerfile_px4_sim_with_GPU
            tag_suffix: "_GPU"
            cache_scope: px4-sim-gpu
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space (GPU build)
        if: matrix.variant == 'gpu'
        run: |
          sudo docker buildx prune -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 180
          max_attempts: 3
          retry_wait_seconds: 90
          command: |
            docker buildx build \
              --file "${{ matrix.dockerfile }}" \
              --build-arg "PX4_VERSION=${{ env.PX4_VERSION }}" \
              --build-arg "XRCE_AGENT_VERSION=v2.4.3" \
              --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.RELEASE_VERSION }}${{ matrix.tag_suffix }}" \
              --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.RELEASE_VERSION }}-latest${{ matrix.tag_suffix }}" \
              --cache-from "type=gha,scope=${{ matrix.cache_scope }}" \
              --cache-to "type=gha,scope=${{ matrix.cache_scope }},mode=max" \
              --provenance=false \
              --sbom=false \
              $( [ "${{ github.event_name }}" != "pull_request" ] && echo --push || echo --output type=docker ) \
              .

  smoke_test:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run headless SITL smoke test
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.RELEASE_VERSION }}-latest"
          docker pull "${IMAGE}"
          chmod +x scripts/smoke_test.sh
          SMOKE_TEST_TIMEOUT=600 ./scripts/smoke_test.sh "${IMAGE}"
